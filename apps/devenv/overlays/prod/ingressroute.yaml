apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ttyd
  namespace: devenv
  annotations:
    external-dns.alpha.kubernetes.io/target: traefik.staging.lan
spec:
  entryPoints:
    - web
  routes:
    - match: "Host(`devenv.staging.lan`)"
      kind: Rule
      services:
        - name: ttyd
          port: 7681
