
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devpod-workspace-sa
  namespace: devenv
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devpod-workspace-pvc-role
  namespace: devenv
rules:
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devpod-workspace-pvc-binding
  namespace: devenv
subjects:
- kind: ServiceAccount
  name: devpod-workspace-sa
  namespace: devenv
roleRef:
  kind: Role
  name: devpod-workspace-pvc-role
  apiGroup: rbac.authorization.k8s.io
