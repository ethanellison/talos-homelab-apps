apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/devenv/overlays/staging
  prune: true
  wait: true
  timeout: 10m
  # postBuild:
  #   substituteFrom:
  #     - kind: ConfigMap
  #       name: staging-vars
  dependsOn:
    - name: infrastructure
