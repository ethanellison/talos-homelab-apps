apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml

patches:
  # kustomize-controller (main memory consumer)
  - target:
      kind: Deployment
      name: kustomize-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: 64Mi
          limits:
            memory: 384Mi
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --concurrent=2

  # helm-controller
  - target:
      kind: Deployment
      name: helm-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: 64Mi
          limits:
            memory: 256Mi
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --concurrent=1

  # source-controller
  - target:
      kind: Deployment
      name: source-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: 32Mi
          limits:
            memory: 128Mi

  # notification-controller
  - target:
      kind: Deployment
      name: notification-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: 16Mi
          limits:
            memory: 64Mi
