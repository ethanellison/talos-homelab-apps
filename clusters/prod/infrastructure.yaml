apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/overlays/prod
  prune: false
  wait: true
  timeout: 10m
  postBuild:
      substituteFrom:
        - kind: ConfigMap
          name: prod-vars
