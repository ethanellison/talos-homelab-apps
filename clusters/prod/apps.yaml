apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/devenv/overlays/ssh-native
  prune: false
  wait: true
  timeout: 10m
  dependsOn:
    - name: infrastructure
