apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: traefik
  install:
    createNamespace: true
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 10m
  values:
    api:
      dashboard: true
    service:
      enabled: true
      type: NodePort
      externalTrafficPolicy: Cluster
    ingressClass:
      enabled: true
      isDefaultClass: true
    additionalArguments:
      - "--entrypoints.web.forwardedHeaders.trustedIPs=10.0.0.0/8"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=10.0.0.0/8"
    providers:
      kubernetesCRD:
        enabled: true
      kubernetesIngress:
        enabled: true
