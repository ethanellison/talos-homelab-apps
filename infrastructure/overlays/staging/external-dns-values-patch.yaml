apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  values:
    sources:
      - service
      - traefik-proxy
    provider:
      name: cloudflare
    domainFilters:
      - sneakysquid.xyz
    txtOwnerId: staging-external-dns
    extraArgs:
      - --source=service
      - --source=traefik-proxy
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token
